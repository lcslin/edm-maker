<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RBQ6L42E6H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RBQ6L42E6H');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDM 沒有神器</title>

    <!-- GrapesJS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13/dist/css/grapes.min.css">
    <script src="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13"></script>
    <script src="https://cdn.jsdelivr.net/npm/grapesjs-mjml@1.0.7/dist/index.js"></script>

    <!-- Utilities -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <!-- Webfonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="sidebar">
        <h2>老派 EDM 沒有神器<br><span style="font-size: 0.45em; color: #999; font-family: var(--font-ui); font-weight: normal; letter-spacing: 0;">Design for EDM OG, the Oldschool Edition</span></h2>

        <div class="control-group">
            <h3>基礎版型範本</h3>
            <button class="template-btn" data-type="seminar">研討會/論壇</button>
            <button class="template-btn" data-type="mission">拓銷團</button>
            <button class="template-btn" data-type="expo">展覽</button>
            <button class="template-btn" data-type="course">訓練課程</button>
            <button class="template-btn" data-type="newsletter">電子報 (VERSE 風格)</button>
        </div>

        <div class="control-group">
            <h3>可用區塊</h3>
            <div id="gjs-blocks"></div>
        </div>

        <div class="control-group" style="flex-grow: 1;">
            <h3>所有編輯，只留存於您的瀏覽器中</h3>
            <div id="saved-list"></div>
        </div>

        <div style="margin-top: 20px;">
            <p style="font-size: 13px; color: #555; line-height: 1.5; margin: 0 0 10px 0;">請打包下載，再上傳到 EDM 系統的「行銷範本」功能中，進行後續使用。</p>
            <button class="action-btn" id="btn-export">匯出EDM封包</button>
        </div>

        <div style="margin-top: 30px; font-size: 12px; color: #666; border-top: 1px dashed #ccc; padding-top: 15px; line-height: 1.6; text-align: left;">
            作為 EDM 系統補強，相關問題請 <a href="msteams://teams.microsoft.com/l/chat/0/0?users=cslin@taitra.org.tw" style="color: var(--primary); font-weight: bold; text-decoration: underline;">按此處</a> 聯繫作者。
        </div>
    </div>

    <div id="main-area">
        <div class="meta-header">
            <div class="meta-row">
                <label>信件主旨</label>
                <input type="text" id="meta-subject" placeholder="輸入信件主旨與預覽摘要...">
            </div>
            <div>
                <button id="btn-save" class="action-btn" style="padding: 10px 25px;">儲存</button>
            </div>
        </div>
        <div id="gjs"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
